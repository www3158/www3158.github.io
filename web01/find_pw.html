<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기 - 성남 문화 관광</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="font.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
    <header id="hd">
        <div class="container">
            <a href="practice.html" class="logo"><img src="./images/logo.jpg" alt="로고" style="height: 50px;"></a>
            <nav class="tnb"><a href="log.html">로그인</a></nav>
        </div>
    </header>

    <div class="sub_visual" style="background-color: #333;">
        <div class="sub_tit_box">
            <h2>비밀번호 찾기</h2>
            <p>비밀번호를 분실하셨나요?</p>
        </div>
    </div>

    <main class="container page">
        <section class="find_wrap">
            <h2 class="page_title">비밀번호 찾기</h2>
            <div class="find_form_box">
                <form action="#" method="post">
                    <div class="find_row">
                        <label for="uid">아이디</label>
                        <input type="text" id="uid" name="uid" placeholder="아이디를 입력하세요">
                    </div>
                    <div class="find_row">
                        <label for="uname">이름</label>
                        <input type="text" id="uname" name="uname" placeholder="이름을 입력하세요">
                    </div>
                    <div class="find_row">
                        <label for="uemail">이메일</label>
                        <input type="email" id="uemail" name="uemail" placeholder="이메일을 입력하세요">
                    </div>
                    <div class="btn_box" style="margin-top: 30px;">
                        <button type="submit" class="btn_login">비밀번호 찾기</button>
                    </div>
                </form>
                <ul class="find_box">
                    <li><a href="log.html">로그인</a></li>
                    <li><a href="find_id.html">아이디 찾기</a></li>
                </ul>
            </div>
        </section>
    </main>

    <footer id="ft">
        <div class="container" style="text-align: center;"><p class="copyright">Copyright ⓒ SEONGNAM CITY.</p></div>
    </footer>
</div>
</body>
</html>
