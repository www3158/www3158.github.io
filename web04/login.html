<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>로그인 | JS</title>
  <link rel="stylesheet" crossorigin href="./auth.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-brand">
      <a class="logo" href="./index.html"><span class="logo-mark"><img src="./assets/jeonse-safe-logo-mark.png" alt="" /></span>JS</a>
      <h1>전세 위험 요소를<br />근거로 확인합니다</h1>
      <p>로그인 후 희망 지역, 보증금, 주택 유형 조건을 기준으로 매물 추천과 위험 분석 리포트를 확인할 수 있습니다.</p>
      <a class="back" href="./index.html">메인으로 돌아가기</a>
    </section>

    <section class="auth-card">
      <h2>로그인</h2>
      <p class="desc">가입한 아이디와 비밀번호를 입력해주세요.</p>

      <form id="loginForm" class="form">
        <input id="loginId" autocomplete="username" placeholder="아이디" />
        <input id="loginPassword" type="password" autocomplete="current-password" placeholder="비밀번호" />
        <button class="submit" type="submit">로그인</button>
        <div class="links">
          <a href="./find-id.html">아이디 찾기</a>
          <a href="./reset-password.html">비밀번호 찾기</a>
          <a href="./signup.html">회원가입</a>
        </div>
        <p id="loginStatus" class="status"></p>
      </form>
    </section>
  </main>

  <script>
    const API_BASE_URL="http://127.0.0.2:8000";
    const TOKEN_KEY="jeonseAuthToken";

    async function api(path, options={}){
      const response=await fetch(`${API_BASE_URL}${path}`,{
        headers:{"Content-Type":"application/json",...(options.headers||{})},
        ...options
      });
      const data=await response.json().catch(()=>({}));
      if(!response.ok)throw new Error(data.detail||"요청을 처리하지 못했습니다.");
      return data;
    }

    loginForm.onsubmit=async e=>{
      e.preventDefault();
      try{
        const data=await api("/api/auth/login",{
          method:"POST",
          body:JSON.stringify({username:loginId.value.trim(),password:loginPassword.value})
        });
        localStorage.setItem(TOKEN_KEY,data.token);
        location.href=data.user?.role==="ADMIN"?"./admin.html":"./mypage.html";
      }catch(err){
        loginStatus.classList.add("error");
        loginStatus.textContent=err.message;
      }
    };
  </script>
</body>
</html>
