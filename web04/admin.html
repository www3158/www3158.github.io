<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>관리자 | JS</title>
  <style>
    :root {
      --bg:#f5f2ec;
      --panel:#fff;
      --ink:#181818;
      --muted:#6f6a63;
      --line:#ded6c8;
      --soft:#faf7f1;
      --gold:#b8945a;
      --danger:#b53535;
      --safe:#127246;
    }
    body { background:var(--bg); color:var(--ink); }
    input, select, textarea, button { font-size:14px; }
    textarea { width:100%; min-height:104px; border:1px solid var(--line); padding:12px; font-family:inherit; resize:vertical; background:#fff; }
    .admin-shell { width:min(1360px,calc(100% - 40px)); margin:0 auto; padding:24px 0 44px; }
    .admin-top { display:flex; justify-content:space-between; align-items:flex-start; gap:20px; margin-bottom:20px; }
    .admin-top h1 { margin:18px 0 6px; font-size:30px; letter-spacing:0; }
    .admin-top p { margin:0; color:var(--muted); font-weight:800; }
    .admin-actions { display:flex; gap:8px; align-items:center; }
    .admin-actions a, .admin-actions button { height:42px; display:grid; place-items:center; padding:0 16px; }
    .admin-layout { display:grid; grid-template-columns:280px minmax(0,1fr); gap:18px; align-items:start; }
    .admin-nav, .admin-work { background:var(--panel); border:1px solid var(--line); }
    .admin-nav { position:sticky; top:18px; padding:14px; }
    .admin-nav button { width:100%; height:48px; margin-bottom:8px; border:1px solid var(--line); background:#fff; text-align:left; padding:0 14px; font-weight:900; color:#2c2925; }
    .admin-nav button.active { background:#171717; border-color:#171717; color:#fff; }
    .metric { display:grid; gap:8px; margin-top:14px; padding-top:14px; border-top:1px solid #ece5db; }
    .metric div { display:flex; justify-content:space-between; align-items:center; padding:9px 10px; background:var(--soft); color:#50483e; font-size:13px; font-weight:900; }
    .metric b { font-size:18px; color:#111; }
    .status-line { min-height:22px; margin:12px 0 0; color:var(--safe); font-size:13px; font-weight:900; line-height:1.5; }
    .status-line.error { color:var(--danger); }
    .admin-work { padding:22px; min-height:680px; }
    .panel-head { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid #eee7dc; }
    .panel-head h2 { margin:0; font-size:24px; }
    .panel-head p { margin:6px 0 0; color:var(--muted); font-weight:800; line-height:1.45; }
    .admin-grid { display:grid; grid-template-columns:320px minmax(0,1fr); gap:18px; align-items:start; }
    .admin-grid.wide { grid-template-columns:1fr; }
    .edit-box { border:1px solid var(--line); background:var(--soft); padding:16px; }
    .edit-box h3 { margin:0 0 12px; font-size:16px; }
    .form { display:grid; gap:10px; }
    .split { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .table-wrap { overflow:auto; border:1px solid var(--line); background:#fff; }
    table { width:100%; min-width:760px; border-collapse:collapse; }
    th, td { padding:12px; border-bottom:1px solid #eee7dc; text-align:left; vertical-align:top; font-size:13px; line-height:1.55; }
    th { position:sticky; top:0; z-index:1; background:#f7f3ec; color:#4e463c; font-weight:900; white-space:nowrap; }
    td strong { display:block; margin-bottom:4px; color:#111; font-size:14px; }
    tr:hover td { background:#fffdf8; }
    .muted { color:var(--muted); }
    th:last-child, td:last-child { width:128px; min-width:128px; position:sticky; right:0; background:#fff; box-shadow:-8px 0 12px rgba(255,255,255,.92); }
    th:last-child { background:#f7f3ec; }
    .row-actions { display:flex; gap:6px; flex-wrap:nowrap; }
    .mini { height:34px; padding:0 10px; border:1px solid #c9b28a; background:#fffaf1; color:#745223; font-weight:900; white-space:nowrap; }
    .mini.dark { background:#111; border-color:#111; color:#fff; }
    .mini.danger { border-color:#c55; color:var(--danger); background:#fff; }
    .pager { display:flex; justify-content:center; gap:6px; flex-wrap:wrap; margin-top:12px; }
    .pager button { min-width:36px; height:36px; border:1px solid var(--line); background:#fff; font-weight:900; color:#4e463c; }
    .pager button.active { background:#111; border-color:#111; color:#fff; }
    .badge { display:inline-flex; align-items:center; height:24px; padding:0 8px; background:#f2eadc; color:#61491d; font-size:12px; font-weight:900; }
    .badge.safe { background:#e9f7ef; color:#12683f; }
    .badge.warn { background:#fff3dc; color:#8a5714; }
    .badge.danger { background:#fdeaea; color:#a92f2f; }
    .admin-thumb { width:72px; height:54px; margin-bottom:8px; border:1px solid var(--line); background:#f1ece3; object-fit:cover; display:block; }
    .hidden { display:none !important; }
    .form-toggle { height:38px; padding:0 12px; border:1px solid var(--line); background:#fff; font-weight:900; }
    .property-form-wrap.collapsed { display:none; }
    @media(max-width:1020px) {
      .admin-layout, .admin-grid { grid-template-columns:1fr; }
      .admin-nav { position:static; }
    }
    @media(max-width:700px) {
      .admin-shell { width:calc(100% - 24px); padding-top:16px; }
      .admin-top, .admin-actions { flex-direction:column; align-items:stretch; }
      .split { grid-template-columns:1fr; }
      .admin-work { padding:14px; }
    }
  </style>
  <link rel="stylesheet" crossorigin href="./auth.css">
</head>
<body>
  <main class="admin-shell">
    <header class="admin-top">
      <div>
        <a class="logo" href="./index.html"><span class="logo-mark"><img src="./assets/jeonse-safe-logo-mark.png" alt="" /></span>JS</a>
        <h1>관리자 운영 콘솔</h1>
        <p id="adminUser">관리자 권한 확인 중</p>
      </div>
      <div class="admin-actions">
        <a class="sub-btn" href="./index.html">사용자 화면</a>
        <button id="logoutBtn" class="sub-btn" type="button">로그아웃</button>
      </div>
    </header>

    <section class="admin-layout">
      <aside class="admin-nav">
        <button class="active" data-tab="properties">매물 관리</button>
        <button data-tab="inquiries">문의 관리</button>
        <button data-tab="checklist">체크리스트 관리</button>
        <div class="metric">
          <div><span>등록 매물</span><b id="metricProperties">-</b></div>
          <div><span>미완료 문의</span><b id="metricInquiries">-</b></div>
          <div><span>노출 체크리스트</span><b id="metricChecklist">-</b></div>
        </div>
        <p id="pageStatus" class="status-line"></p>
      </aside>

      <section class="admin-work">
        <div data-panel="properties">
          <div class="panel-head">
            <div><h2>매물 관리</h2><p>등록 또는 수정하면 사용자 추천/전체매물 화면에 반영됩니다.</p></div>
            <button id="propertyFormToggle" class="form-toggle" type="button">매물 입력 열기</button>
          </div>
          <div class="admin-grid wide">
            <form id="propertyForm" class="edit-box form property-form-wrap collapsed">
              <h3 id="propertyFormTitle">새 매물 등록</h3>
              <input id="propertyTitle" placeholder="매물명" />
              <input id="propertyAddress" placeholder="주소" />
              <div class="split"><input id="propertyRegion" placeholder="지역" /><input id="propertyLawd" placeholder="법정동 코드" /></div>
              <div class="split">
                <select id="propertyType"><option value="APT">아파트</option><option value="VILLA">다가구/빌라</option><option value="OFFICETEL">오피스텔</option><option value="SINGLE_MULTI">원룸/다가구</option></select>
                <select id="propertyRisk"><option>안전</option><option>주의</option><option>위험</option><option>확인</option></select>
              </div>
              <div class="split"><input id="propertyDeposit" type="number" placeholder="전세 보증금" /><input id="propertyRent" type="number" placeholder="월세" /></div>
              <div class="split"><input id="propertyArea" type="number" step="0.01" placeholder="면적 m2" /><input id="propertyFloor" type="number" placeholder="층" /></div>
              <div class="split"><input id="propertyMaintenance" type="number" placeholder="관리비" /><input id="propertyStation" type="number" placeholder="역 거리(분)" /></div>
              <input id="propertyMoveIn" placeholder="입주 가능일" />
              <input id="propertyImage" placeholder="매물 사진 URL" />
              <textarea id="propertyTags" placeholder="위험/확인 태그 · 테마: 신혼부부, 직장인, 학군, 저예산, 역세권, 안심"></textarea>
              <button class="submit" type="submit">저장</button>
              <button id="propertyReset" class="sub-btn" type="button">새 매물 입력</button>
            </form>
            <div>
              <div class="table-wrap"><table><thead><tr><th>매물</th><th>조건</th><th>상태</th><th>작업</th></tr></thead><tbody id="propertyRows"></tbody></table></div>
              <div id="propertyPager" class="pager"></div>
            </div>
          </div>
        </div>

        <div class="hidden" data-panel="inquiries">
          <div class="panel-head">
            <div><h2>문의 관리</h2><p>사용자 문의를 확인하고 상태와 답변을 기록합니다.</p></div>
          </div>
          <div class="admin-grid">
            <form id="inquiryForm" class="edit-box form">
              <h3>문의 답변</h3>
              <input id="inquiryId" placeholder="선택된 문의 ID" readonly />
              <select id="inquiryStatus"><option>대기</option><option>확인중</option><option>답변완료</option><option>완료</option></select>
              <textarea id="inquiryAnswer" placeholder="관리자 답변"></textarea>
              <button class="submit" type="submit">답변 저장</button>
            </form>
            <div class="table-wrap"><table><thead><tr><th>문의자</th><th>내용</th><th>상태</th><th>작업</th></tr></thead><tbody id="inquiryRows"></tbody></table></div>
          </div>
        </div>

        <div class="hidden" data-panel="checklist">
          <div class="panel-head">
            <div><h2>체크리스트 관리</h2><p>노출 항목을 바꾸면 사용자 체크리스트에 반영됩니다.</p></div>
          </div>
          <div class="admin-grid">
            <form id="checklistForm" class="edit-box form">
              <h3 id="checkFormTitle">새 항목 등록</h3>
              <input id="checkTitle" placeholder="항목명" />
              <textarea id="checkDescription" placeholder="설명"></textarea>
              <div class="split"><input id="checkCategory" placeholder="분류" /><input id="checkOrder" type="number" placeholder="순서" /></div>
              <select id="checkActive"><option value="true">노출</option><option value="false">숨김</option></select>
              <button class="submit" type="submit">저장</button>
              <button id="checkReset" class="sub-btn" type="button">새 항목 입력</button>
            </form>
            <div class="table-wrap"><table><thead><tr><th>항목</th><th>분류</th><th>노출</th><th>작업</th></tr></thead><tbody id="checkRows"></tbody></table></div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const API_BASE_URL="https://www3158-web04-api.onrender.com";
    const TOKEN_KEY="jeonseAuthToken";
    const token=localStorage.getItem(TOKEN_KEY);
    let selectedPropertyId=null, selectedCheckId=null, propertyPage=1, properties=[], inquiries=[], checks=[], propertyPhotos=[], propertyPhotoById=new Map();

    const authHeaders=()=>({"Content-Type":"application/json",Authorization:`Bearer ${token}`});
    const money=v=>Number(v||0).toLocaleString()+"원";
    const status=(text,error=false)=>{pageStatus.textContent=text;pageStatus.classList.toggle("error",error)};
    const esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
    const riskBadge=v=>`<span class="badge ${v==="안전"?"safe":v==="위험"?"danger":v==="주의"?"warn":""}">${esc(v||"확인")}</span>`;

    async function api(path,options={}){
      const response=await fetch(`${API_BASE_URL}${path}`,{headers:{...authHeaders(),...(options.headers||{})},...options});
      const data=await response.json().catch(()=>({}));
      if(!response.ok)throw new Error(data.detail||"요청 처리에 실패했습니다.");
      return data;
    }

    async function boot(){
      if(!token){location.href="./login.html";return}
      try{
        const me=await api("/api/auth/me");
        if(me.role!=="ADMIN"){location.href="./index.html";return}
        adminUser.textContent=`${me.name} · ${me.username}`;
        await loadPropertyPhotos();
        bind();
        await refreshAll();
      }catch(err){localStorage.removeItem(TOKEN_KEY);location.href="./login.html"}
    }

    async function loadPropertyPhotos(){
      try{
        const html=await fetch("./index.html").then(r=>r.text());
        const match=html.match(/const KOREAN_BUILDING_PHOTOS=([\s\S]*?);/);
        propertyPhotos=match?JSON.parse(match[1]):[];
      }catch(e){ propertyPhotos=[]; }
    }

    function buildPropertyPhotoMap(){
      propertyPhotoById=new Map();
      const sorted=[...properties].sort((a,b)=>Number(a.id)-Number(b.id));
      sorted.forEach((x,index)=>{
        const fallback=propertyPhotos.length?propertyPhotos[(index+10)%propertyPhotos.length]:"";
        propertyPhotoById.set(x.id,x.image_url||fallback);
      });
    }

    function bind(){
      document.querySelectorAll("[data-tab]").forEach(btn=>btn.onclick=()=>showTab(btn.dataset.tab));
      logoutBtn.onclick=()=>{localStorage.removeItem(TOKEN_KEY);location.href="./index.html"};
      propertyReset.onclick=resetPropertyForm;
      propertyFormToggle.onclick=togglePropertyForm;
      checkReset.onclick=resetCheckForm;
      propertyForm.onsubmit=saveProperty;
      inquiryForm.onsubmit=saveInquiry;
      checklistForm.onsubmit=saveCheck;
    }

    function togglePropertyForm(){
      propertyForm.classList.toggle("collapsed");
      propertyFormToggle.textContent=propertyForm.classList.contains("collapsed")?"매물 입력 열기":"매물 입력 닫기";
    }

    function openPropertyForm(){
      propertyForm.classList.remove("collapsed");
      propertyFormToggle.textContent="매물 입력 닫기";
    }

    function showTab(tab){
      document.querySelectorAll("[data-tab]").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
      document.querySelectorAll("[data-panel]").forEach(p=>p.classList.toggle("hidden",p.dataset.panel!==tab));
    }

    async function refreshAll(){
      await Promise.all([loadSummary(),loadProperties(),loadInquiries(),loadChecks()]);
      status("최신 데이터가 반영되었습니다.");
    }

    async function loadSummary(){
      const d=await api("/api/admin/summary");
      metricProperties.textContent=d.property_count;
      metricInquiries.textContent=d.pending_inquiry_count;
      metricChecklist.textContent=d.checklist_count;
    }

    async function loadProperties(){
      const d=await api("/api/admin/properties");
      properties=d.items||[];
      buildPropertyPhotoMap();
      renderProperties(propertyPage);
    }

    function renderProperties(page){
      const per=10;
      const pageCount=Math.max(1,Math.ceil(properties.length/per));
      propertyPage=Math.min(Math.max(page,1),pageCount);
      const start=(propertyPage-1)*per;
      propertyRows.innerHTML=properties.slice(start,start+per).map(x=>{
        const image=propertyPhotoById.get(x.id);
        return `<tr>
        <td>${image?`<img class="admin-thumb" src="${esc(image)}" alt="">`:""}<strong>${esc(x.title)}</strong><span class="muted">${esc(x.address||"")}</span></td>
        <td>${esc(x.property_type)}<br>${money(x.deposit)} · ${x.area_m2||"-"}m2 · ${x.floor||"-"}층</td>
        <td>${riskBadge(x.risk_level)}<br><span class="muted">${esc(x.risk_tags||"")}</span></td>
        <td><div class="row-actions"><button class="mini dark" onclick="editProperty(${x.id})">수정</button><button class="mini danger" onclick="deleteProperty(${x.id})">삭제</button></div></td>
      </tr>`}).join("");
      propertyPager.innerHTML=Array.from({length:pageCount},(_,i)=>i+1).map(n=>`<button class="${n===propertyPage?"active":""}" onclick="renderProperties(${n})">${n}</button>`).join("");
    }

    function editProperty(id){
      const x=properties.find(v=>v.id===id); if(!x)return;
      openPropertyForm();
      selectedPropertyId=id; propertyFormTitle.textContent="매물 수정";
      propertyTitle.value=x.title||""; propertyAddress.value=x.address||""; propertyRegion.value=x.region||""; propertyLawd.value=x.lawd_cd||"";
      propertyType.value=x.property_type||"APT"; propertyRisk.value=x.risk_level||"확인"; propertyDeposit.value=x.deposit||"";
      propertyRent.value=x.monthly_rent||0; propertyArea.value=x.area_m2||""; propertyFloor.value=x.floor||"";
      propertyMaintenance.value=x.maintenance_fee||0; propertyStation.value=x.station_distance_min||""; propertyMoveIn.value=x.move_in_date||"";
      propertyImage.value=x.image_url||"";
      propertyTags.value=x.risk_tags||"";
    }

    async function saveProperty(e){
      e.preventDefault();
      const payload={title:propertyTitle.value,address:propertyAddress.value,region:propertyRegion.value,lawd_cd:propertyLawd.value||null,property_type:propertyType.value,deposit:Number(propertyDeposit.value),monthly_rent:Number(propertyRent.value||0),area_m2:propertyArea.value?Number(propertyArea.value):null,floor:propertyFloor.value?Number(propertyFloor.value):null,maintenance_fee:Number(propertyMaintenance.value||0),station_distance_min:propertyStation.value?Number(propertyStation.value):null,move_in_date:propertyMoveIn.value||null,risk_level:propertyRisk.value,risk_tags:propertyTags.value||null,image_url:propertyImage.value.trim()||null};
      const path=selectedPropertyId?`/api/admin/properties/${selectedPropertyId}`:"/api/admin/properties";
      await api(path,{method:selectedPropertyId?"PUT":"POST",body:JSON.stringify(payload)});
      resetPropertyForm(); await refreshAll();
    }

    async function deleteProperty(id){
      if(!confirm("이 매물을 삭제할까요?"))return;
      await api(`/api/admin/properties/${id}`,{method:"DELETE"}); await refreshAll();
    }
    function resetPropertyForm(){selectedPropertyId=null;propertyForm.reset();propertyType.value="APT";propertyRisk.value="확인";propertyFormTitle.textContent="새 매물 등록"}

    async function loadInquiries(){
      const d=await api("/api/admin/inquiries");
      inquiries=d.items||[];
      inquiryRows.innerHTML=inquiries.map(x=>`<tr>
        <td><strong>${esc(x.name)}</strong><span class="muted">${esc(x.phone)}<br>${esc(x.inquiry_type)}</span></td>
        <td>${esc(x.message)}${x.answer?`<br><br><b>답변</b><br>${esc(x.answer)}`:""}</td>
        <td><span class="badge">${esc(x.status)}</span></td>
        <td><button class="mini dark" onclick="editInquiry(${x.id})">답변</button></td>
      </tr>`).join("");
    }
    function editInquiry(id){const x=inquiries.find(v=>v.id===id); if(!x)return; inquiryId.value=x.id; inquiryStatus.value=x.status||"확인중"; inquiryAnswer.value=x.answer||""}
    async function saveInquiry(e){
      e.preventDefault();
      if(!inquiryId.value){status("답변할 문의를 선택해주세요.",true);return}
      await api(`/api/admin/inquiries/${inquiryId.value}`,{method:"PUT",body:JSON.stringify({status:inquiryStatus.value,answer:inquiryAnswer.value})});
      inquiryForm.reset(); await refreshAll();
    }

    async function loadChecks(){
      const d=await api("/api/admin/checklist");
      checks=d.items||[];
      checkRows.innerHTML=checks.map(x=>`<tr>
        <td><strong>${esc(x.title)}</strong><span class="muted">${esc(x.description)}</span></td>
        <td>${esc(x.category)}<br><span class="muted">순서 ${x.sort_order}</span></td>
        <td><span class="badge ${x.active?"safe":"danger"}">${x.active?"노출":"숨김"}</span></td>
        <td><div class="row-actions"><button class="mini dark" onclick="editCheck(${x.id})">수정</button><button class="mini danger" onclick="deleteCheck(${x.id})">삭제</button></div></td>
      </tr>`).join("");
    }
    function editCheck(id){const x=checks.find(v=>v.id===id); if(!x)return; selectedCheckId=id; checkFormTitle.textContent="항목 수정"; checkTitle.value=x.title||""; checkDescription.value=x.description||""; checkCategory.value=x.category||""; checkOrder.value=x.sort_order||0; checkActive.value=String(x.active)}
    async function saveCheck(e){
      e.preventDefault();
      const payload={title:checkTitle.value,description:checkDescription.value,category:checkCategory.value||"기본",sort_order:Number(checkOrder.value||0),active:checkActive.value==="true"};
      const path=selectedCheckId?`/api/admin/checklist/${selectedCheckId}`:"/api/admin/checklist";
      await api(path,{method:selectedCheckId?"PUT":"POST",body:JSON.stringify(payload)});
      resetCheckForm(); await refreshAll();
    }
    async function deleteCheck(id){
      if(!confirm("이 체크리스트를 삭제할까요?"))return;
      await api(`/api/admin/checklist/${id}`,{method:"DELETE"}); await refreshAll();
    }
    function resetCheckForm(){selectedCheckId=null;checklistForm.reset();checkActive.value="true";checkFormTitle.textContent="새 항목 등록"}
    boot();
  </script>
</body>
</html>
