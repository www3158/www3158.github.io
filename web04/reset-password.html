<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>비밀번호 찾기 | JS</title>
  <link rel="stylesheet" crossorigin href="./auth.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-brand">
      <a class="logo" href="./index.html"><span class="logo-mark"><img src="./assets/jeonse-safe-logo-mark.png" alt="" /></span>JS</a>
      <h1>휴대폰 인증 후<br />비밀번호를 재설정합니다</h1>
      <p>아이디와 가입 휴대폰 번호를 확인한 뒤 새 비밀번호를 설정합니다.</p>
      <a class="back" href="./login.html">로그인으로 돌아가기</a>
    </section>
    <section class="auth-card">
      <h2>비밀번호 찾기</h2>
      <p class="desc">아이디와 휴대폰 번호를 입력해주세요.</p>
      <form id="resetForm" class="form">
        <input id="username" autocomplete="username" placeholder="아이디" />
        <div class="phone-row">
          <input id="phone" autocomplete="tel" placeholder="휴대폰 번호" />
          <button id="sendPhoneCode" class="sub-btn" type="button">인증번호 발송</button>
        </div>
        <input id="code" inputmode="numeric" placeholder="인증번호" />
        <input id="newPassword" type="password" autocomplete="new-password" placeholder="새 비밀번호" />
        <button class="submit" type="submit">비밀번호 변경</button>
        <p id="pageStatus" class="status"></p>
      </form>
    </section>
  </main>
  <script>
    const API_BASE_URL="http://127.0.0.2:8000";
    async function api(path, options={}){
      const response=await fetch(`${API_BASE_URL}${path}`,{
        headers:{"Content-Type":"application/json",...(options.headers||{})},
        ...options
      });
      const data=await response.json().catch(()=>({}));
      if(!response.ok)throw new Error(data.detail||"요청을 처리하지 못했습니다.");
      return data;
    }
    sendPhoneCode.onclick=async ()=>{
      try{
        await api("/api/auth/send-phone-code",{method:"POST",body:JSON.stringify({phone:phone.value})});
        pageStatus.classList.remove("error");
        pageStatus.textContent="인증번호를 발송했습니다.";
      }catch(err){
        pageStatus.classList.add("error");
        pageStatus.textContent=err.message;
      }
    };
    resetForm.onsubmit=async e=>{
      e.preventDefault();
      try{
        await api("/api/auth/verify-phone-code",{method:"POST",body:JSON.stringify({phone:phone.value,code:code.value})});
        await api("/api/auth/reset-password",{
          method:"POST",
          body:JSON.stringify({
            username:username.value.trim(),
            phone:phone.value,
            code:code.value,
            new_password:newPassword.value
          })
        });
        pageStatus.classList.remove("error");
        pageStatus.textContent="비밀번호가 변경되었습니다.";
      }catch(err){
        pageStatus.classList.add("error");
        pageStatus.textContent=err.message;
      }
    };
  </script>
</body>
</html>
