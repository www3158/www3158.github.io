<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>www3158 Portfolio</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --panel: #ffffff;
        --text: #172033;
        --muted: #657083;
        --line: #dfe4ee;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, "Noto Sans KR", sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      main {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }

      header {
        margin-bottom: 28px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 34px;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      a {
        display: block;
        min-height: 156px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: inherit;
        text-decoration: none;
      }

      a:hover {
        border-color: var(--accent);
      }

      strong {
        display: block;
        margin-bottom: 10px;
        font-size: 20px;
      }

      span {
        display: inline-block;
        margin-bottom: 18px;
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>개인 프로젝트</h1>
        <p>GitHub Pages에 배포한 프로젝트 모음입니다.</p>
      </header>

      <section class="grid" aria-label="프로젝트 목록">
        <a href="/web01/">
          <span>web01</span>
          <strong>성남 문화관광</strong>
          <p>정적 HTML/CSS 웹사이트</p>
        </a>
        <a href="/web02/">
          <span>web02</span>
          <strong>Rider Starter AI</strong>
          <p>Vue 프론트엔드 프로젝트</p>
        </a>
        <a href="/web03/">
          <span>web03</span>
          <strong>LUXE SHOP</strong>
          <p>Vue 쇼핑몰 데모</p>
        </a>
        <a href="/web04/">
          <span>web04</span>
          <strong>Jeonse Guard</strong>
          <p>Vue 전세 안전 서비스</p>
        </a>
      </section>
    </main>
  </body>
</html>
